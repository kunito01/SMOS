name: Build and Release PWA

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-pwa-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npx tsc --noEmit --incremental false

      - name: Build portable PWA
        run: npm run package:pwa

      - name: Create and verify release archive
        shell: bash
        run: |
          set -euo pipefail

          bundle="output/pwa/studio-map-os-pwa"
          for required in \
            "$bundle/server.js" \
            "$bundle/.next-pwa/BUILD_ID" \
            "$bundle/public/sw.js" \
            "$bundle/START_STUDIO_MAP_OS.command" \
            "$bundle/START_STUDIO_MAP_OS.sh" \
            "$bundle/START_STUDIO_MAP_OS.bat" \
            "$bundle/LICENSE" \
            "$bundle/THIRD_PARTY_NOTICES.txt" \
            "$bundle/README.txt"; do
            test -s "$required"
          done
          test -x "$bundle/START_STUDIO_MAP_OS.command"
          test -x "$bundle/START_STUDIO_MAP_OS.sh"
          test ! -e "$bundle/node_modules/sharp"
          test ! -e "$bundle/node_modules/@img"
          if find "$bundle/node_modules" -type f -name '*.node' -print -quit | grep -q .; then
            echo "The release archive contains a platform-specific native Node.js module."
            exit 1
          fi
          test -d "$bundle/THIRD_PARTY_LICENSES"
          third_party_license="$(find "$bundle/THIRD_PARTY_LICENSES" -type f -print -quit)"
          test -n "$third_party_license"

          for package_name in next react react-dom; do
            grep -Fx "Package: $package_name" "$bundle/THIRD_PARTY_NOTICES.txt" >/dev/null
          done

          cd output/pwa
          rm -f studio-map-os-pwa.zip studio-map-os-pwa.zip.sha256
          COPYFILE_DISABLE=1 zip -X -q -r studio-map-os-pwa.zip studio-map-os-pwa
          unzip -tq studio-map-os-pwa.zip
          unzip -Z1 studio-map-os-pwa.zip > "$RUNNER_TEMP/studio-map-os-pwa.entries"

          for required in \
            studio-map-os-pwa/server.js \
            studio-map-os-pwa/.next-pwa/BUILD_ID \
            studio-map-os-pwa/public/sw.js \
            studio-map-os-pwa/START_STUDIO_MAP_OS.command \
            studio-map-os-pwa/START_STUDIO_MAP_OS.sh \
            studio-map-os-pwa/START_STUDIO_MAP_OS.bat \
            studio-map-os-pwa/LICENSE \
            studio-map-os-pwa/THIRD_PARTY_NOTICES.txt \
            studio-map-os-pwa/README.txt; do
            grep -Fx "$required" "$RUNNER_TEMP/studio-map-os-pwa.entries" >/dev/null
          done

          for package_name in next react react-dom; do
            grep -E \
              "^studio-map-os-pwa/THIRD_PARTY_LICENSES/${package_name}-[^/]+/[^/]+$" \
              "$RUNNER_TEMP/studio-map-os-pwa.entries" >/dev/null
          done

          if grep -E \
            '^studio-map-os-pwa/node_modules/(sharp|@img)(/|$)' \
            "$RUNNER_TEMP/studio-map-os-pwa.entries" >/dev/null; then
            echo "The release archive contains an unused native image optimizer dependency."
            exit 1
          fi

          sha256sum studio-map-os-pwa.zip > studio-map-os-pwa.zip.sha256
          sha256sum -c studio-map-os-pwa.zip.sha256

      - name: Smoke-test extracted archive
        shell: bash
        run: |
          set -euo pipefail

          smoke="$RUNNER_TEMP/studio-map-os-pwa-smoke"
          log="$RUNNER_TEMP/studio-map-os-pwa.log"
          rm -rf "$smoke"
          mkdir -p "$smoke"
          unzip -q output/pwa/studio-map-os-pwa.zip -d "$smoke"

          launcher="$smoke/studio-map-os-pwa/START_STUDIO_MAP_OS.sh"
          test -x "$launcher"
          PORT=3002 HOSTNAME=127.0.0.1 "$launcher" >"$log" 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT

          ready=0
          for _ in {1..30}; do
            if curl -fsS http://127.0.0.1:3002/login >/dev/null; then
              ready=1
              break
            fi
            sleep 1
          done

          if [ "$ready" -ne 1 ]; then
            cat "$log"
            exit 1
          fi

          curl -fsS http://127.0.0.1:3002/brand/smos-logo-02.png >/dev/null

          kill "$server_pid"
          wait "$server_pid" || true
          trap - EXIT

      - name: Upload manual-build artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: studio-map-os-pwa-${{ github.sha }}
          path: |
            output/pwa/studio-map-os-pwa.zip
            output/pwa/studio-map-os-pwa.zip.sha256
          if-no-files-found: error
          compression-level: 0
          retention-days: 14

      - name: Publish GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" \
            'output/pwa/studio-map-os-pwa.zip#Studio Map OS PWA' \
            'output/pwa/studio-map-os-pwa.zip.sha256#SHA-256 checksum' \
            --verify-tag \
            --notes "" \
            --title "Studio Map OS $GITHUB_REF_NAME"
