name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript check
        run: npx tsc --noEmit --incremental false

      - name: Build static PWA for GitHub Pages
        env:
          NEXT_PUBLIC_CLOUDKIT_API_TOKEN: ${{ secrets.CLOUDKIT_API_TOKEN }}
          NEXT_PUBLIC_CLOUDKIT_CONTAINER_ID: ${{ vars.CLOUDKIT_CONTAINER_ID }}
          NEXT_PUBLIC_CLOUDKIT_ENVIRONMENT: production
        run: GITHUB_PAGES=1 npm run build

      - name: Verify exported PWA
        shell: bash
        run: |
          set -euo pipefail
          touch out/.nojekyll

          for required in \
            out/login/index.html \
            out/register/index.html \
            out/offline/index.html \
            out/company/index.html \
            out/company/index.txt \
            out/project/index.html \
            out/project/index.txt \
            out/project-costs/index.html \
            out/project-costs/index.txt \
            out/project-share/index.html \
            out/project-share/index.txt \
            out/share/index.html \
            out/share/index.txt \
            out/manifest.webmanifest \
            out/sw.js \
            out/icons/apple-touch-icon.png \
            out/icons/pwa-192.png \
            out/icons/pwa-512.png \
            out/icons/pwa-maskable-192.png \
            out/icons/pwa-maskable-512.png \
            out/icons/pwa-maskable.svg; do
            test -s "$required"
          done

          node <<'NODE'
          const { readFileSync, readdirSync } = require("node:fs");
          const { join } = require("node:path");

          const manifest = JSON.parse(readFileSync("out/manifest.webmanifest", "utf8"));
          const expected = {
            id: "/SMOS/",
            start_url: "/SMOS/login/",
            scope: "/SMOS/"
          };

          for (const [field, value] of Object.entries(expected)) {
            if (manifest[field] !== value) {
              throw new Error(
                `Expected manifest.${field} to be ${JSON.stringify(value)}, received ${JSON.stringify(manifest[field])}.`
              );
            }
          }

          if (
            !Array.isArray(manifest.icons) ||
            manifest.icons.length === 0 ||
            manifest.icons.some(({ src }) => typeof src !== "string" || !src.startsWith("/SMOS/icons/"))
          ) {
            throw new Error("Every manifest icon must use the /SMOS/icons/ base path.");
          }

          const worker = readFileSync("out/sw.js", "utf8");
          if (worker.includes("/SMOS/SMOS/")) {
            throw new Error("The service worker contains a duplicated /SMOS base path.");
          }

          for (const route of [
            "/SMOS/login/",
            "/SMOS/register/",
            "/SMOS/offline/",
            "/SMOS/company/",
            "/SMOS/project/",
            "/SMOS/project-costs/",
            "/SMOS/project-share/",
            "/SMOS/share/"
          ]) {
            if (!worker.includes(route)) {
              throw new Error(`The service worker does not precache ${route}.`);
            }
          }

          for (const dataRoute of [
            "/SMOS/login/index.txt",
            "/SMOS/register/index.txt",
            "/SMOS/company/index.txt",
            "/SMOS/project/index.txt",
            "/SMOS/project-costs/index.txt",
            "/SMOS/project-share/index.txt",
            "/SMOS/share/index.txt"
          ]) {
            if (!worker.includes(dataRoute)) {
              throw new Error(`The service worker does not precache ${dataRoute}.`);
            }
          }

          const collectJavaScript = (directory) =>
            readdirSync(directory, { withFileTypes: true }).flatMap((entry) => {
              const path = join(directory, entry.name);
              if (entry.isDirectory()) {
                return collectJavaScript(path);
              }
              return entry.isFile() && entry.name.endsWith(".js") ? [path] : [];
            });

          for (const path of collectJavaScript("out/_next/static/chunks")) {
            const source = readFileSync(path, "utf8");
            if (
              source.includes('addEventListener("online"') ||
              source.includes("addEventListener('online'")
            ) {
              throw new Error(`The PWA client must not reload or change state when the connection returns: ${path}.`);
            }
          }
          NODE

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
